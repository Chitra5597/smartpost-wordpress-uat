apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress

spec:
  replicas: 1

  selector:
    matchLabels:
      app: wordpress

  template:
    metadata:
      labels:
        app: wordpress

    spec:
      containers:
      - name: wordpress
        image: wordpress:6.4.1-php8.1-apache

        ports:
        - containerPort: 80

        env:
        - name: WORDPRESS_DB_HOST
          value: mysql

        - name: WORDPRESS_DB_USER
          value: root

        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        - name: WORDPRESS_DB_NAME
          value: smartpost

        envFrom:
        - configMapRef:
            name: wordpress-config