apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress

spec:
  replicas: 1

  selector:
    matchLabels:
      app: wordpress

  template:
    metadata:
      labels:
        app: wordpress

    spec:
      containers:
      - name: wordpress
        image: image-registry.openshift-image-registry.svc:5000/chitrafegde55-dev/wordpress-build:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: wordpress-config

        env:
        - name: WORDPRESS_DB_HOST
          value: mysql

        - name: WORDPRESS_DB_USER
          value: root

        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        - name: WORDPRESS_DB_NAME
          value: smartpost