services:

  wordpress:
    image: wordpress:6.4-php8.1-apache
    container_name: smartpost-wp

    ports:
      - "8080:80"

    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: root123
      WORDPRESS_DB_NAME: smartpost

    volumes:
      - ./wordpress:/var/www/html

    depends_on:
      - mysql


  mysql:
    image: mysql:5.7
    container_name: smartpost-db

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smartpost

    ports:
      - "3306:3306"

    volumes:
      - ./mysql-data:/var/lib/mysql